<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>너에게</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Noto Sans KR', sans-serif;
  background:#fffafc;
  color:#333;
}

.section {
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px 20px;
  text-align:center;
  box-sizing:border-box;
  opacity:0;
  transform:translateY(40px);
  transition:all 1s ease;
}

.section.active {
  opacity:1;
  transform:translateY(0);
}

.text {
  max-width:700px;
  font-size:1.4rem;
  line-height:1.8;
}

.photo {
  max-width:600px;
}

.photo img {
  width:100%;
  border-radius:16px;
  margin-top:20px;
}

.final {
  font-size:2rem;
}

.button {
  margin-top:20px;
  padding:15px 30px;
  font-size:1.2rem;
  border:none;
  border-radius:30px;
  background:#ff6f91;
  color:white;
  cursor:pointer;
}

@media(max-width:768px){
  .text{font-size:1.2rem;}
  .final{font-size:1.5rem;}
}
</style>
</head>
<button onclick="startMusic()" style="position:fixed;top:20px;right:20px;z-index:999;">
  시작하기 🎵
</button>

<!-- 🎵 배경음악 (music.mp3 파일을 같은 폴더에 넣어주세요) -->
<audio id="bgm" autoplay loop>
  <source src="bgm.mp3" type="audio/mpeg">
</audio>
<body onclick="startMusic()">
<script>
function startMusic(){
  const music = document.getElementById('bgm');
  music.play();
}
</script>

<!-- 편지 시작 -->
<section class="section"><div class="text">
<p>너에게 하고 싶은 말이 있어.</p>
</div></section>

<section class="section"><div class="text">
<p>처음 너에게 연락하던 날을 기억해.</p>
<div class="photo"><img src="1.jpg"></div>
</div></section>

<section class="section"><div class="text">
<p>처음 마주 앉았던 그날, 괜히 더 긴장됐던 나.</p>
<div class="photo"><img src="2.jpg"></div>
</div></section>

<section class="section"><div class="text">
<p>그리고 우리가 연인이 되던 순간.</p>
<div class="photo"><img src="3.jpg"></div>
</div></section>

<section class="section"><div class="text">
<p>웃고 또 웃었던 우리만의 시간들.</p>
<div class="photo"><img src="4.jpg"></div>
</div></section>

<section class="section"><div class="text">
<p>조금은 떨렸지만, 더 확신이 생겼던 날.</p>
<div class="photo"><img src="5.jpg"></div>
</div></section>

<section class="section"><div class="text">
<p>함께 먹고, 웃고, 하루를 채워가던 시간들.</p>
<div class="photo"><img src="6.jpg"></div>
</div></section>

<section class="section"><div class="text">
<p>그 어떤 순간보다 즐거웠던 날들.</p>
<div class="photo"><img src="7.jpg"></div>
</div></section>

<section class="section"><div class="text">
<p>같이 걸었던 계절들.</p>
<div class="photo"><img src="8.jpg"></div>
</div></section>

<section class="section"><div class="text">
<p>따뜻했던 우리의 겨울.</p>
<div class="photo"><img src="9.jpg"></div>
</div></section>

<section class="section"><div class="text">
<p>내 생일에 네가 해준 그 마음.</p>
<div class="photo"><img src="10.jpg"></div>
</div></section>

<section class="section"><div class="text">
<p>그리고 어느 날,
네가 나에게 해준 그 말.</p>
<div class="photo"><img src="11.jpg"></div>
</div></section>

<section class="section"><div class="text final">
<p>
그날 네가 나에게 했던 말,
이번엔 내가 해도 될까?
<br><br>
나랑 결혼해줄래? 💍
</p>
<button class="button" onclick="showAnswer()">YES</button>
</div></section>

<script>
const sections = document.querySelectorAll('.section');

const observer = new IntersectionObserver(entries=>{
 entries.forEach(entry=>{
  if(entry.isIntersecting){
    entry.target.classList.add('active');
  }
 });
},{threshold:0.4});

sections.forEach(sec=>observer.observe(sec));

function showAnswer(){
 const music = document.getElementById('bgm');
 if(music){ music.pause(); }
 document.body.innerHTML = "<h1 style='text-align:center; margin-top:40vh;'>사랑해 ❤️ 평생 함께하자</h1>";
}
</script>

</body>
</html>
